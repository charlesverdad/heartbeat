version: '3.8'

services:
  ghost-mcp:
    build: .
    container_name: ghost-mcp-server
    environment:
      - GHOST_API_URL=${GHOST_API_URL}
      - GHOST_ADMIN_API_KEY=${GHOST_ADMIN_API_KEY}
      - GHOST_API_VERSION=${GHOST_API_VERSION:-v5.0}
    # MCP servers communicate via stdio, not HTTP ports
    # This container is meant to be used with Claude Code's MCP config
    stdin_open: true
    tty: true
    restart: unless-stopped
